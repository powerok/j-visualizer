server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: j-visualizer-backend
  datasource:
    url: jdbc:h2:mem:jvisualizer;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics

jvisualizer:
  # 메트릭 보관 기간 (분)
  metrics-retention-minutes: 60
  # 최대 보관 CPU 프로파일 수
  max-profiles: 100
  # WebSocket broadcast 활성화
  websocket-broadcast: true
  # 슬로우 SQL 임계값 (ms)
  slow-sql-threshold-ms: 1000

logging:
  level:
    com.jvisualizer: DEBUG
    org.springframework.web.socket: INFO
