server:
  port: 8090

spring:
  application:
    name: j-visualizer-example
  datasource:
    url: jdbc:h2:mem:exampledb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        session_factory:
          statement_inspector: com.jvisualizer.example.sql.SqlCapture
  h2:
    console:
      enabled: true
      path: /h2-console

# J-Visualizer Backend URL
jvisualizer:
  backend-url: ${JVISUALIZER_BACKEND_URL:http://localhost:8080}
  slow-sql-threshold-ms: 100

management:
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  level:
    com.jvisualizer.example: DEBUG
    org.hibernate.SQL: OFF
    org.hibernate.orm.jdbc.bind: OFF